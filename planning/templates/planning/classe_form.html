{% extends 'base.html' %}

{% block title %}{{ title }} - Classe{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>{{ title }}</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}

        {% for field in form %}
            <div class="mb-3">
                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger">{{ field.errors|striptags }}</div>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="btn" class="btn" style="background: purple; color: white;">Enregistrer</button>
    </form>
</div>
{% endblock %}
