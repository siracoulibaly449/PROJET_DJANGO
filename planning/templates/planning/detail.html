{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>{{ title }}</h2>
        <a href="{{ list_url }}" class="btn" style="background: purple; color: white;">Retour</a>
    </div>

    <div class="card">
        <div class="card-body">
            <dl class="row">
                {% for field in fields %}
                    <dt class="col-sm-3">{{ field.label }}</dt>
                    <dd class="col-sm-9">{{ field.value }}</dd>
                {% endfor %}
            </dl>
        </div>
    </div>
</div>
{% endblock %}
