{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-body">
            <h2>{{ title }}</h2>
            <p>Voulez-vous vraiment supprimer <strong>{{ object_name }}</strong> ? Cette action est irréversible.</p>
            <form method="post" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Supprimer</button>
            </form>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Annuler</a>
        </div>
    </div>
</div>
{% endblock %}
